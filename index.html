<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>화성바른초 월간 운영 계획</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Import Map for ES Modules (모듈 참조 오류 해결) -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18",
        "react-dom/client": "https://esm.sh/react-dom@18/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18,react-dom@18",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    // --- 1. 라이브러리 및 아이콘 불러오기 ---
    import React, { useState, useEffect, useMemo, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Calendar, Clock, MapPin, User, FileText, Download, Star, Edit2, Trash2, ChevronLeft, ChevronRight, AlertCircle, CheckCircle2 } from 'lucide-react';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, writeBatch, query } from 'firebase/firestore';

    // --- 2. Firebase 설정 (선생님 개인 계정 연결) ---
    const firebaseConfig = {
      apiKey: "AIzaSyDeV51pP4BQqxReIfBmXPEST9zeok5aAOs",
      authDomain: "school-calendar-6789a.firebaseapp.com",
      projectId: "school-calendar-6789a",
      storageBucket: "school-calendar-6789a.firebasestorage.app",
      messagingSenderId: "697249862283",
      appId: "1:697249862283:web:4b75b2deb2693d771b7a8e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'hwaseong-barun-calendar';

    // --- 3. 유틸리티 함수 및 상수 ---
    const WEEKDAYS = ['일', '월', '화', '수', '목', '금', '토'];

    const formatDate = (date) => {
      const d = new Date(date);
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    const getDayName = (dateStr) => {
      const d = new Date(dateStr);
      return WEEKDAYS[d.getDay()];
    };

    const HOLIDAYS = {
      '2026-01-01': '신정', '2026-02-16': '설날 연휴', '2026-02-17': '설날', '2026-02-18': '설날 연휴',
      '2026-03-01': '삼일절', '2026-05-05': '어린이날', '2026-05-24': '부처님오신날', '2026-06-06': '현충일',
      '2026-08-15': '광복절', '2026-09-24': '추석 연휴', '2026-09-25': '추석', '2026-09-26': '추석 연휴',
      '2026-10-03': '개천절', '2026-10-09': '한글날', '2026-12-25': '기독탄신일'
    };

    // --- 4. 메인 애플리케이션 컴포넌트 ---
    function App() {
      const [user, setUser] = useState(null);
      const [events, setEvents] = useState([]);
      const [currentMonth, setCurrentMonth] = useState(new Date());
      const hasScrolledRef = useRef(false);
      
      const initialFormState = {
        date: formatDate(new Date()),
        endDate: formatDate(new Date()),
        isRepeating: false,
        repeatDays: [],
        excludeWeekends: false,
        activity: '',
        time: '',
        manager: '',
        location: '',
        note: '',
        isImportant: false,
        groupId: null,
      };
      const [formData, setFormData] = useState(initialFormState);
      const [isEditing, setIsEditing] = useState(false);
      const [editingId, setEditingId] = useState(null);

      const [repeatModal, setRepeatModal] = useState({ isOpen: false, action: null, event: null, updatedData: null });
      const [toast, setToast] = useState({ show: false, message: '', type: 'success' });

      const showToast = (message, type = 'success') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3000);
      };

      useEffect(() => {
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (err) {
            console.error("Auth error:", err);
            showToast("인증에 실패했습니다. 새로고침 해주세요.", "error");
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const eventsRef = collection(db, 'artifacts', appId, 'public', 'data', 'school_events');
        const q = query(eventsRef);

        const unsubscribe = onSnapshot(q, (snapshot) => {
          const fetchedEvents = snapshot.docs.map(doc => ({
            ...doc.data(),
            id: doc.id // 버그 수정: DB의 잘못된 id 값에 덮어씌워지지 않도록 무조건 마지막에 덮어씌움
          }));
          setEvents(fetchedEvents);
        }, (error) => {
          console.error("Fetch error:", error);
          showToast("데이터를 불러오는데 실패했습니다.", "error");
        });

        return () => unsubscribe();
      }, [user]);

      const todayStr = formatDate(new Date());
      
      const daysInViewMonth = useMemo(() => {
        const year = currentMonth.getFullYear();
        const month = currentMonth.getMonth();
        const numDays = new Date(year, month + 1, 0).getDate();
        return Array.from({ length: numDays }, (_, i) => {
          const d = new Date(year, month, i + 1);
          return formatDate(d);
        });
      }, [currentMonth]);

      const sortEventsByTime = (a, b) => {
        if (a.time && b.time) return a.time.localeCompare(b.time);
        if (a.time && !b.time) return -1;
        if (!a.time && b.time) return 1;
        return 0;
      };

      const currentMonthEvents = useMemo(() => {
        const prefix = `${currentMonth.getFullYear()}-${String(currentMonth.getMonth() + 1).padStart(2, '0')}`;
        return events.filter(e => e.date.startsWith(prefix)).sort((a, b) => {
          if (a.date !== b.date) return a.date.localeCompare(b.date);
          return sortEventsByTime(a, b);
        });
      }, [events, currentMonth]);

      const todaysEvents = useMemo(() => {
        return events.filter(e => e.date === todayStr).sort(sortEventsByTime);
      }, [events, todayStr]);

      const handleInputChange = (e) => {
        const { name, value, type, checked } = e.target;
        setFormData(prev => ({
          ...prev,
          [name]: type === 'checkbox' ? checked : value
        }));
      };

      const toggleRepeatDay = (dayIndex) => {
        setFormData(prev => {
          const days = [...prev.repeatDays];
          if (days.includes(dayIndex)) {
            return { ...prev, repeatDays: days.filter(d => d !== dayIndex) };
          } else {
            return { ...prev, repeatDays: [...days, dayIndex].sort() };
          }
        });
      };

      const handleRowClick = (dateStr) => {
        if (isEditing) return;
        setFormData({
          ...initialFormState,
          date: dateStr,
          endDate: dateStr
        });
      };

      const generateUUID = () => {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
          const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
          return v.toString(16);
        });
      };

      const saveEvent = async (e) => {
        e.preventDefault();
        if (!user) return;
        if (!formData.date || !formData.activity) {
          showToast("날짜와 교육활동내용은 필수입니다.", "error");
          return;
        }

        try {
          // 버그 수정: DB 오염 방지를 위해 저장 전 고유 id 필드를 명시적으로 제거
          const cleanFormData = { ...formData };
          delete cleanFormData.id;

          if (isEditing) {
            if (cleanFormData.groupId) {
              setRepeatModal({ isOpen: true, action: 'edit', event: { id: editingId, ...cleanFormData }, updatedData: cleanFormData });
            } else {
              const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'school_events', editingId);
              await setDoc(docRef, { ...cleanFormData, updatedAt: new Date().toISOString() }, { merge: true });
              showToast("일정이 수정되었습니다.");
              resetForm();
            }
          } else {
            if (cleanFormData.isRepeating) {
              const batch = writeBatch(db);
              const startDate = new Date(cleanFormData.date);
              const endDate = new Date(cleanFormData.endDate);
              const newGroupId = generateUUID();
              let count = 0;

              for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                const day = d.getDay();
                const isWeekend = day === 0 || day === 6;

                if (cleanFormData.excludeWeekends && isWeekend) continue;

                if (cleanFormData.repeatDays.length === 0 || cleanFormData.repeatDays.includes(day)) {
                  const docRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'school_events'));
                  batch.set(docRef, {
                    ...cleanFormData,
                    date: formatDate(d),
                    groupId: newGroupId,
                    createdAt: new Date().toISOString()
                  });
                  count++;
                }
              }
              if (count > 0) {
                await batch.commit();
                showToast(`${count}개의 일정이 등록되었습니다.`);
              } else {
                showToast("선택한 기간에 해당하는 날짜가 없습니다.", "error");
                return;
              }
            } else {
              const docRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'school_events'));
              await setDoc(docRef, {
                ...cleanFormData,
                isRepeating: false,
                groupId: null,
                createdAt: new Date().toISOString()
              });
              showToast("일정이 등록되었습니다.");
            }
            resetForm();
          }
        } catch (error) {
          console.error("Save error:", error);
          showToast("저장 중 오류가 발생했습니다.", "error");
        }
      };

      const startEdit = (eventToEdit) => {
        setIsEditing(true);
        setEditingId(eventToEdit.id);
        setFormData({
          ...eventToEdit,
          isRepeating: !!eventToEdit.groupId,
          endDate: eventToEdit.date,
        });
      };

      const promptDelete = (eventToDelete) => {
        if (eventToDelete.groupId) {
          setRepeatModal({ isOpen: true, action: 'delete', event: eventToDelete });
        } else {
          executeDelete(eventToDelete.id);
        }
      };

      const executeDelete = async (id) => {
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'school_events', id));
          showToast("삭제되었습니다.");
          if (isEditing && editingId === id) resetForm();
        } catch (err) {
          showToast("삭제 실패", "error");
        }
      };

      const handleRepeatAction = async (scope) => {
        const { action, event, updatedData } = repeatModal;
        setRepeatModal({ isOpen: false, action: null, event: null, updatedData: null });
        if (!event) return;

        try {
          const batch = writeBatch(db);
          const groupEvents = events.filter(e => e.groupId === event.groupId);
          let targetEvents = [];

          if (scope === 'single') {
            targetEvents = [event];
          } else if (scope === 'future') {
            targetEvents = groupEvents.filter(e => e.date >= event.date);
          } else if (scope === 'all') {
            targetEvents = groupEvents;
          }

          if (action === 'delete') {
            targetEvents.forEach(e => {
              const ref = doc(db, 'artifacts', appId, 'public', 'data', 'school_events', e.id);
              batch.delete(ref);
            });
            await batch.commit();
            showToast(`${targetEvents.length}개의 일정이 삭제되었습니다.`);
            if (isEditing && targetEvents.some(e => e.id === editingId)) resetForm();
          } else if (action === 'edit') {
            targetEvents.forEach(e => {
              const ref = doc(db, 'artifacts', appId, 'public', 'data', 'school_events', e.id);
              const dataToSave = { ...updatedData, updatedAt: new Date().toISOString() };
              delete dataToSave.id; // 확실히 제거
              if (scope !== 'single') {
                 delete dataToSave.date;
              }
              batch.update(ref, dataToSave);
            });
            await batch.commit();
            showToast(`${targetEvents.length}개의 일정이 수정되었습니다.`);
            resetForm();
          }
        } catch (err) {
          console.error("Batch error:", err);
          showToast("처리 중 오류가 발생했습니다.", "error");
        }
      };

      const resetForm = () => {
        setIsEditing(false);
        setEditingId(null);
        setFormData(initialFormState);
      };

      const exportToCSV = () => {
        let csvContent = "\uFEFF"; 
        csvContent += "날짜,요일,시간,교육활동내용,담당자,장소,비고,중요여부\n";
        
        daysInViewMonth.forEach(dateStr => {
          const dayEvents = currentMonthEvents.filter(e => e.date === dateStr);
          const isHoliday = HOLIDAYS[dateStr];
          const dayName = getDayName(dateStr);
          
          if (dayEvents.length === 0) {
            const activityText = isHoliday ? isHoliday : '';
            csvContent += `${dateStr},${dayName},,${activityText},,,,\n`;
          } else {
            dayEvents.forEach(e => {
              const escapeCsv = (str) => `"${(str || '').replace(/"/g, '""')}"`;
              csvContent += `${dateStr},${dayName},${escapeCsv(e.time)},${escapeCsv(e.activity)},${escapeCsv(e.manager)},${escapeCsv(e.location)},${escapeCsv(e.note)},${e.isImportant ? 'O' : ''}\n`;
            });
          }
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `월간운영계획_${currentMonth.getFullYear()}년${currentMonth.getMonth() + 1}월.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const changeMonth = (offset) => {
        setCurrentMonth(prev => {
          const next = new Date(prev);
          next.setMonth(prev.getMonth() + offset);
          return next;
        });
      };

      const goToToday = () => {
        setCurrentMonth(new Date());
        setTimeout(() => {
          const todayRow = document.getElementById(`row-${todayStr}`);
          if (todayRow) {
            const container = todayRow.closest('.overflow-y-auto');
            if (container) {
              // 상단 고정 헤더 영역을 피해 보기 좋은 상단 위치(140px 여백)로 스크롤 이동
              container.scrollTo({
                top: todayRow.offsetTop - 140,
                behavior: 'smooth'
              });
            } else {
              // 혹시 컨테이너를 못 찾을 경우의 예비 동작
              todayRow.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
          }
        }, 100);
      };

      // --- 자동 스크롤 로직 ---
      // 1. 서버에서 일정 데이터를 성공적으로 불러왔을 때 (표 높이가 맞춰진 직후)
      useEffect(() => {
        if (!hasScrolledRef.current && events.length > 0) {
          setTimeout(goToToday, 100);
          hasScrolledRef.current = true; // 스크롤 완료 처리
        }
      }, [events]);

      // 2. 만약 등록된 일정이 하나도 없는 빈 표일 경우를 대비하여 0.8초 후 무조건 자동 이동
      useEffect(() => {
        const timer = setTimeout(() => {
          if (!hasScrolledRef.current) {
            goToToday();
            hasScrolledRef.current = true;
          }
        }, 800);
        return () => clearTimeout(timer);
      }, []);

      const isWeekendOrHoliday = (dateStr) => {
        const d = new Date(dateStr);
        return d.getDay() === 0 || d.getDay() === 6 || !!HOLIDAYS[dateStr];
      };

      return (
        <div className="h-screen w-full flex bg-gray-50 font-sans text-gray-800 overflow-hidden">
          {toast.show && (
            <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 z-50 px-4 py-2 rounded shadow-lg flex items-center space-x-2 text-white ${toast.type === 'error' ? 'bg-red-500' : 'bg-green-500'}`}>
              {toast.type === 'error' ? <AlertCircle size={18} /> : <CheckCircle2 size={18} />}
              <span>{toast.message}</span>
            </div>
          )}

          {repeatModal.isOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
              <div className="bg-white p-6 rounded-lg shadow-xl w-96">
                <h3 className="text-lg font-bold mb-4">반복 일정 {repeatModal.action === 'edit' ? '수정' : '삭제'}</h3>
                <p className="text-sm text-gray-600 mb-6">이 일정은 반복되는 일정입니다. 어떻게 처리하시겠습니까?</p>
                <div className="space-y-3">
                  <button onClick={() => handleRepeatAction('single')} className="w-full text-left px-4 py-3 bg-gray-50 hover:bg-gray-100 rounded border border-gray-200">
                    <span className="font-semibold block text-blue-600">이 일정만</span>
                    <span className="text-xs text-gray-500">선택한 날짜의 일정만 {repeatModal.action === 'edit' ? '수정' : '삭제'}합니다.</span>
                  </button>
                  <button onClick={() => handleRepeatAction('future')} className="w-full text-left px-4 py-3 bg-gray-50 hover:bg-gray-100 rounded border border-gray-200">
                    <span className="font-semibold block text-blue-600">이 일정 및 향후 일정</span>
                    <span className="text-xs text-gray-500">이 날짜를 포함하여 이후의 반복 일정을 모두 변경합니다.</span>
                  </button>
                  <button onClick={() => handleRepeatAction('all')} className="w-full text-left px-4 py-3 bg-gray-50 hover:bg-gray-100 rounded border border-gray-200">
                    <span className="font-semibold block text-blue-600">전체 반복 일정</span>
                    <span className="text-xs text-gray-500">그룹으로 묶인 모든 일정을 {repeatModal.action === 'edit' ? '수정' : '삭제'}합니다.</span>
                  </button>
                </div>
                <div className="mt-4 flex justify-end">
                  <button onClick={() => setRepeatModal({ isOpen: false, action: null, event: null, updatedData: null })} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">취소</button>
                </div>
              </div>
            </div>
          )}

          <div className="w-2/3 h-full flex flex-col border-r border-gray-200 bg-white">
            <div className="p-6 border-b border-gray-200 shrink-0 bg-white shadow-sm z-20">
              <div className="flex justify-between items-center mb-4">
                <h1 className="text-2xl font-bold text-gray-900 flex items-center">
                  <Calendar className="mr-3 text-blue-600" />
                  화성바른초 월간 운영 계획
                </h1>
                <button onClick={exportToCSV} className="flex items-center px-3 py-1.5 bg-green-50 text-green-700 hover:bg-green-100 rounded border border-green-200 transition-colors text-sm font-medium">
                  <Download size={16} className="mr-1.5" /> 엑셀 다운로드
                </button>
              </div>
              
              <div className="bg-blue-50 rounded-lg p-4 border border-blue-100">
                <h2 className="text-sm font-bold text-blue-800 mb-2 flex items-center">
                  <Star size={16} className="mr-1 text-yellow-500 fill-current" /> 오늘의 일정 ({todayStr})
                </h2>
                {todaysEvents.length > 0 ? (
                  <ul className="space-y-1">
                    {todaysEvents.map(ev => (
                      <li key={`imp-${ev.id}`} className={`text-sm flex items-start ${ev.isImportant ? 'font-bold text-blue-900' : 'text-gray-800'}`}>
                        {ev.time && <span className="font-semibold mr-2 whitespace-nowrap">{ev.time}</span>}
                        <span>{ev.isImportant && <Star size={12} className="inline mr-1 text-yellow-500 fill-current" />}{ev.activity}</span>
                        {ev.location && <span className="text-gray-500 ml-2 text-xs font-normal">({ev.location})</span>}
                      </li>
                    ))}
                  </ul>
                ) : (
                  <p className="text-sm text-gray-500 italic">오늘 등록된 일정이 없습니다.</p>
                )}
              </div>
            </div>

            <div className="flex-1 overflow-y-auto relative">
              <div className="sticky top-0 bg-white z-10 border-b border-gray-300 shadow-sm pt-4 pb-2 px-6 flex justify-between items-center">
                <div className="flex items-center space-x-2">
                  <button onClick={() => changeMonth(-1)} className="p-1 hover:bg-gray-100 rounded"><ChevronLeft size={20}/></button>
                  <h2 className="text-xl font-bold">{currentMonth.getFullYear()}년 {currentMonth.getMonth() + 1}월</h2>
                  <button onClick={() => changeMonth(1)} className="p-1 hover:bg-gray-100 rounded"><ChevronRight size={20}/></button>
                </div>
                <button onClick={goToToday} className="px-3 py-1.5 bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 rounded shadow-sm text-sm font-medium transition-colors">
                  오늘
                </button>
              </div>

              <table className="w-full text-left border-collapse">
                <thead className="sticky top-[61px] bg-gray-100 shadow-sm z-10 text-sm text-gray-600">
                  <tr>
                    <th className="py-3 px-3 border-b border-gray-300 w-20 text-center whitespace-nowrap">날짜</th>
                    <th className="py-3 px-2 border-b border-gray-300 w-14 text-center whitespace-nowrap">요일</th>
                    <th className="py-3 px-3 border-b border-gray-300 w-28 text-center whitespace-nowrap">시간</th>
                    <th className="py-3 px-4 border-b border-gray-300 w-full min-w-[200px]">교육활동내용</th>
                    <th className="py-3 px-3 border-b border-gray-300 w-24 text-center whitespace-nowrap">담당자</th>
                    <th className="py-3 px-3 border-b border-gray-300 w-40 min-w-[80px] text-center">장소</th>
                    <th className="py-3 px-3 border-b border-gray-300 w-96 min-w-[80px] text-center">비고</th>
                    <th className="py-3 px-2 border-b border-gray-300 w-20 text-center whitespace-nowrap">관리</th>
                  </tr>
                </thead>
                <tbody className="text-sm">
                  {daysInViewMonth.map((dateStr) => {
                    const dayEvents = currentMonthEvents.filter(e => e.date === dateStr);
                    const dayName = getDayName(dateStr);
                    const isHoliWeek = isWeekendOrHoliday(dateStr);
                    const isToday = dateStr === todayStr;
                    const holidayName = HOLIDAYS[dateStr];

                    let rowBgClassBase = "hover:bg-blue-50 transition-colors border-b ";
                    if (isToday) rowBgClassBase += "bg-[#FEF08A] ";
                    else if (isHoliWeek) rowBgClassBase += "bg-[#FFF0F5] ";
                    else rowBgClassBase += "bg-white ";

                    if (dayEvents.length === 0) {
                      const finalRowClass = rowBgClassBase + "border-[#7F7F7F] ";
                      return (
                        <tr key={dateStr} id={`row-${dateStr}`} className={`${finalRowClass} cursor-pointer group`} onClick={() => handleRowClick(dateStr)}>
                          <td className="py-3 px-3 font-medium text-gray-600 whitespace-nowrap text-center">{dateStr.split('-').slice(1).join('/')}</td>
                          <td className={`py-3 px-2 text-center whitespace-nowrap ${dayName === '일' ? 'text-red-500' : dayName === '토' ? 'text-blue-500' : ''}`}>{dayName}</td>
                          <td className="py-3 px-3 text-gray-400 whitespace-nowrap"></td>
                          <td className="py-3 px-4 text-gray-500">
                            {holidayName ? <span className="text-red-500 font-semibold">{holidayName}</span> : <span className="opacity-0 group-hover:opacity-100 text-xs text-blue-400">+ 클릭하여 일정 추가</span>}
                          </td>
                          <td className="py-3 px-3 whitespace-nowrap"></td><td className="py-3 px-3"></td><td className="py-3 px-3"></td><td className="py-3 px-2 whitespace-nowrap"></td>
                        </tr>
                      );
                    }

                    return dayEvents.map((ev, idx) => {
                      const isLastEventOfDay = idx === dayEvents.length - 1;
                      const finalRowClass = rowBgClassBase + (isLastEventOfDay ? "border-[#7F7F7F] " : "border-gray-200 ");
                      
                      return (
                        <tr key={ev.id} id={idx === 0 ? `row-${dateStr}` : undefined} className={`${finalRowClass} ${ev.isImportant ? 'font-semibold text-blue-900' : ''}`} onClick={(e) => {
                          if(e.target.closest('.action-btn')) return;
                          handleRowClick(dateStr);
                        }}>
                          {idx === 0 ? (
                            <>
                              <td className="py-3 px-3 font-medium text-gray-700 whitespace-nowrap text-center" rowSpan={dayEvents.length}>{dateStr.split('-').slice(1).join('/')}</td>
                              <td className={`py-3 px-2 text-center whitespace-nowrap ${dayName === '일' ? 'text-red-500' : dayName === '토' ? 'text-blue-500' : ''}`} rowSpan={dayEvents.length}>{dayName}</td>
                            </>
                          ) : null}
                          
                          <td className="py-3 px-3 whitespace-nowrap text-center">{ev.time}</td>
                          <td className="py-3 px-4">
                            <div className="flex items-center">
                              {ev.isImportant && <Star size={14} className="mr-1.5 text-yellow-500 fill-current shrink-0" />}
                              {holidayName && idx === 0 && <span className="mr-2 text-red-500 whitespace-nowrap">[{holidayName}]</span>}
                              <span>{ev.activity}</span>
                              {ev.groupId && <span className="ml-2 text-[10px] bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded border border-blue-200 whitespace-nowrap" title="반복일정">반복</span>}
                            </div>
                          </td>
                          <td className="py-3 px-3 text-gray-600 whitespace-nowrap text-center">{ev.manager}</td>
                          <td className="py-3 px-3 text-gray-600 text-center">{ev.location}</td>
                          <td className="py-3 px-3 text-gray-500 text-xs text-center">{ev.note}</td>
                          <td className="py-3 px-2 text-center whitespace-nowrap">
                            <div className="flex justify-center space-x-2 action-btn">
                              <button onClick={(e) => { e.stopPropagation(); startEdit(ev); }} className="text-gray-400 hover:text-blue-600" title="수정"><Edit2 size={16}/></button>
                              <button onClick={(e) => { e.stopPropagation(); promptDelete(ev); }} className="text-gray-400 hover:text-red-600" title="삭제"><Trash2 size={16}/></button>
                            </div>
                          </td>
                        </tr>
                      );
                    });
                  })}
                </tbody>
              </table>
            </div>
          </div>

          <div className="w-1/3 bg-white shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.05)] z-30 flex flex-col h-full border-l border-gray-200">
            <div className="p-6 border-b border-gray-200 bg-gray-50 flex justify-between items-center shrink-0">
              <h2 className="text-lg font-bold text-gray-800 flex items-center">
                {isEditing ? <Edit2 className="mr-2 text-blue-600" size={20} /> : <FileText className="mr-2 text-blue-600" size={20} />}
                {isEditing ? '일정 수정' : '새 일정 등록'}
              </h2>
              {isEditing && (
                <button onClick={resetForm} className="text-sm text-gray-500 hover:text-gray-700 underline">취소</button>
              )}
            </div>

            <div className="p-6 overflow-y-auto flex-1">
              <form onSubmit={saveEvent} className="space-y-5">
                <div className="bg-gray-50 p-4 rounded-lg border border-gray-200 space-y-4">
                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-1">날짜 <span className="text-red-500">*</span></label>
                    <div className="flex items-center space-x-2">
                      <input type="date" name="date" value={formData.date} onChange={handleInputChange} required className="flex-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm" />
                      {formData.isRepeating && (
                        <>
                          <span className="text-gray-500">~</span>
                          <input type="date" name="endDate" value={formData.endDate} onChange={handleInputChange} required className="flex-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm" />
                        </>
                      )}
                    </div>
                  </div>

                  {!isEditing && (
                    <div>
                      <label className="flex items-center space-x-2 cursor-pointer mb-2">
                        <input type="checkbox" name="isRepeating" checked={formData.isRepeating} onChange={handleInputChange} className="rounded text-blue-600 focus:ring-blue-500" />
                        <span className="text-sm font-medium text-gray-700">기간 선택 (요일 미선택 시 매일 반복)</span>
                      </label>
                      
                      {formData.isRepeating && (
                        <div className="space-y-3 mt-3 px-1">
                          <label className="flex items-center space-x-2 cursor-pointer">
                            <input type="checkbox" name="excludeWeekends" checked={formData.excludeWeekends} onChange={handleInputChange} className="rounded text-red-500 focus:ring-red-500" />
                            <span className="text-sm font-medium text-red-600">주말(토, 일) 제외</span>
                          </label>
                          <div className="flex justify-between">
                            {WEEKDAYS.map((day, idx) => (
                              <button
                                key={day}
                                type="button"
                                onClick={() => toggleRepeatDay(idx)}
                                disabled={formData.excludeWeekends && (idx === 0 || idx === 6)}
                                className={`w-8 h-8 rounded-full text-xs font-medium flex items-center justify-center transition-colors ${
                                  formData.excludeWeekends && (idx === 0 || idx === 6)
                                    ? 'bg-gray-100 text-gray-300 cursor-not-allowed border border-gray-200'
                                    : formData.repeatDays.includes(idx) 
                                      ? 'bg-blue-600 text-white shadow-md' 
                                      : 'bg-white border border-gray-300 text-gray-600 hover:bg-gray-100'
                                }`}
                              >
                                {day}
                              </button>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>

                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-1">교육활동내용 <span className="text-red-500">*</span></label>
                  <input type="text" name="activity" value={formData.activity} onChange={handleInputChange} required placeholder="예: 1학기 학부모 총회" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm" />
                </div>

                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1 flex items-center"><Clock size={14} className="mr-1"/> 시간</label>
                    <input type="text" name="time" value={formData.time} onChange={handleInputChange} placeholder="예: 14:00~16:00" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1 flex items-center"><User size={14} className="mr-1"/> 담당자</label>
                    <input type="text" name="manager" value={formData.manager} onChange={handleInputChange} placeholder="예: 교무부장" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm" />
                  </div>
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1 flex items-center"><MapPin size={14} className="mr-1"/> 장소</label>
                  <input type="text" name="location" value={formData.location} onChange={handleInputChange} placeholder="예: 시청각실" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm" />
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">비고</label>
                  <textarea name="note" value={formData.note} onChange={handleInputChange} rows="2" placeholder="추가 전달사항" className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm resize-none"></textarea>
                </div>

                <div className="bg-yellow-50 p-3 rounded border border-yellow-200">
                  <label className="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" name="isImportant" checked={formData.isImportant} onChange={handleInputChange} className="rounded text-yellow-500 focus:ring-yellow-500 w-4 h-4" />
                    <span className="text-sm font-bold text-yellow-800 flex items-center">
                      <Star size={16} className="mr-1 fill-current" /> 중요 일정으로 표시
                    </span>
                  </label>
                </div>

                <div className="pt-4 border-t border-gray-200">
                  <button type="submit" className="w-full bg-[#2563EB] hover:bg-blue-700 text-white font-bold py-3 px-4 rounded shadow transition-colors flex justify-center items-center">
                    {isEditing ? '변경사항 저장' : '일정 등록하기'}
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      );
    }

    // --- 5. 앱 렌더링 ---
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
